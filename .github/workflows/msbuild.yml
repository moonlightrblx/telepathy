name: MSBuild C++

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64          # Change to Win32 / ARM64 if needed
  SOLUTION_OR_PROJECT: .       # Use your .sln or .vcxproj file here, e.g. "MyProject.vcxproj"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3   # Updated to v3

      - name: Create build directory
        run: mkdir -p build\trash

      - name: Build
        working-directory: ${{ github.workspace }}
        run: |
          msbuild "${{ env.SOLUTION_OR_PROJECT }}" `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform=${{ env.BUILD_PLATFORM }} `
            /p:OutDir=build\trash\ `
            /p:IntDir=build\trash\ `
            /m `
            /nologo `
            /verbosity:minimal `
            /p:UseMultiToolTask=true `
            /p:EnforceProcessCountAcrossBuilds=true
